<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JumpBoss</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="layout">
    <section class="game-wrap">
      <h1>JumpBoss</h1>
      <canvas id="game" width="960" height="540"></canvas>
      <div class="controls">
        <span>A/D oder ←/→ laufen, Space Doppeljump, Shift Dash, Enter Start</span>
        <span id="status">Sammle Münzen, besiege den Endboss!</span>
      </div>
    </section>

    <aside class="sidebar">
      <h2>Live Leaderboard</h2>
      <ol id="leaderboard"></ol>
      <div class="submit">
        <input id="name" placeholder="Dein Name" maxlength="24" />
        <button id="submitScore">Score senden</button>
      </div>
      <p id="scoreInfo">Score: 0</p>
    </aside>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
